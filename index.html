<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Effects Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .tagline {
            color: #888;
            font-size: 14px;
        }

        .canvas-wrapper {
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        .controls {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }

        .control-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .control-section:last-child {
            border-bottom: none;
        }

        .control-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 12px;
            font-weight: 600;
            display: block;
        }

        .preset-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .preset-btn {
            padding: 8px;
            background: #333;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .preset-btn:hover {
            background: #444;
            border-color: #666;
        }

        .preset-btn.active {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
        }

        .slider-group {
            margin-bottom: 16px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            border: none;
        }

        .color-input {
            width: 100%;
            height: 40px;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00ff88;
        }

        .checkbox-label {
            cursor: pointer;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #00dd77;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #333;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .info-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            grid-column: 1 / -1;
            font-size: 13px;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .controls {
                max-height: none;
            }

            .canvas-wrapper {
                aspect-ratio: auto;
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">particles</div>
            <div class="tagline">Create beautiful particle effects</div>
        </header>

        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-section">
                <label class="control-label">Presets</label>
                <div class="preset-buttons">
                    <button class="preset-btn active" onclick="loadPreset('explosion')">Explosion</button>
                    <button class="preset-btn" onclick="loadPreset('fireworks')">Fireworks</button>
                    <button class="preset-btn" onclick="loadPreset('rain')">Rain</button>
                    <button class="preset-btn" onclick="loadPreset('snow')">Snow</button>
                    <button class="preset-btn" onclick="loadPreset('confetti')">Confetti</button>
                    <button class="preset-btn" onclick="loadPreset('smoke')">Smoke</button>
                </div>
            </div>

            <div class="control-section">
                <label class="control-label">Particle Count</label>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Count</span>
                        <span id="countDisplay">50</span>
                    </div>
                    <input type="range" id="particleCount" min="10" max="500" value="50" oninput="updateCount()">
                </div>
            </div>

            <div class="control-section">
                <label class="control-label">Speed</label>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Speed</span>
                        <span id="speedDisplay">3</span>
                    </div>
                    <input type="range" id="speed" min="0.5" max="10" step="0.5" value="3" oninput="updateSpeed()">
                </div>
            </div>

            <div class="control-section">
                <label class="control-label">Size</label>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Size</span>
                        <span id="sizeDisplay">5</span>
                    </div>
                    <input type="range" id="size" min="1" max="20" value="5" oninput="updateSize()">
                </div>
            </div>

            <div class="control-section">
                <label class="control-label">Color</label>
                <input type="color" id="colorPicker" value="#00ff88" oninput="updateColor()">
            </div>

            <div class="control-section">
                <label class="control-label">Lifetime</label>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Duration (s)</span>
                        <span id="lifetimeDisplay">2</span>
                    </div>
                    <input type="range" id="lifetime" min="0.5" max="5" step="0.5" value="2" oninput="updateLifetime()">
                </div>
            </div>

            <div class="control-section">
                <div class="checkbox-group">
                    <input type="checkbox" id="gravity" checked oninput="updateGravity()">
                    <label class="checkbox-label" for="gravity">Gravity</label>
                </div>
            </div>

            <div class="control-section">
                <button class="btn" onclick="clearCanvas()">Clear</button>
                <button class="btn btn-secondary" onclick="downloadFrame()" style="margin-top: 8px;">Download</button>
            </div>
        </div>

        <div class="info-box">
            <strong>Click on canvas</strong> to create particle effect at that location. Customize settings on the right.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        let particles = [];
        let settings = {
            count: 50,
            speed: 3,
            size: 5,
            color: '#00ff88',
            lifetime: 2,
            gravity: true,
            type: 'explosion'
        };

        const presets = {
            explosion: {
                count: 50,
                speed: 6,
                size: 5,
                color: '#ff6b00',
                lifetime: 1.5,
                gravity: true,
                spread: Math.PI * 2
            },
            fireworks: {
                count: 80,
                speed: 5,
                size: 4,
                color: '#ffff00',
                lifetime: 2,
                gravity: true,
                spread: Math.PI * 2
            },
            rain: {
                count: 100,
                speed: 8,
                size: 2,
                color: '#00aaff',
                lifetime: 5,
                gravity: false,
                spread: 0.1
            },
            snow: {
                count: 60,
                speed: 1,
                size: 4,
                color: '#ffffff',
                lifetime: 8,
                gravity: false,
                spread: 0.3
            },
            confetti: {
                count: 100,
                speed: 4,
                size: 6,
                color: '#ff00ff',
                lifetime: 3,
                gravity: true,
                spread: Math.PI * 2
            },
            smoke: {
                count: 30,
                speed: 2,
                size: 10,
                color: '#888888',
                lifetime: 3,
                gravity: false,
                spread: Math.PI * 0.5
            }
        };

        class Particle {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.life = 1;
                this.decay = 1 / (settings.lifetime * 60);
                this.size = settings.size;
                this.color = settings.color;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (settings.gravity) {
                    this.vy += 0.2;
                }

                this.life -= this.decay;
            }

            draw() {
                ctx.fillStyle = this.color + Math.round(this.life * 255).toString(16).padStart(2, '0');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles(x, y) {
            const preset = presets[settings.type];
            for (let i = 0; i < settings.count; i++) {
                const angle = Math.random() * preset.spread - preset.spread / 2;
                const speed = Math.random() * settings.speed + settings.speed * 0.5;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed - Math.random() * 2;

                particles.push(new Particle(x, y, vx, vy));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles = particles.filter(p => p.life > 0);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        function loadPreset(name) {
            settings.type = name;
            const preset = presets[name];
            Object.assign(settings, preset);

            document.getElementById('particleCount').value = preset.count;
            document.getElementById('speed').value = preset.speed;
            document.getElementById('size').value = preset.size;
            document.getElementById('colorPicker').value = preset.color;
            document.getElementById('lifetime').value = preset.lifetime;
            document.getElementById('gravity').checked = preset.gravity;

            updateAllDisplays();

            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function updateCount() {
            settings.count = parseInt(document.getElementById('particleCount').value);
            document.getElementById('countDisplay').textContent = settings.count;
        }

        function updateSpeed() {
            settings.speed = parseFloat(document.getElementById('speed').value);
            document.getElementById('speedDisplay').textContent = settings.speed;
        }

        function updateSize() {
            settings.size = parseInt(document.getElementById('size').value);
            document.getElementById('sizeDisplay').textContent = settings.size;
        }

        function updateColor() {
            settings.color = document.getElementById('colorPicker').value;
        }

        function updateLifetime() {
            settings.lifetime = parseFloat(document.getElementById('lifetime').value);
            document.getElementById('lifetimeDisplay').textContent = settings.lifetime;
        }

        function updateGravity() {
            settings.gravity = document.getElementById('gravity').checked;
        }

        function updateAllDisplays() {
            document.getElementById('countDisplay').textContent = settings.count;
            document.getElementById('speedDisplay').textContent = settings.speed;
            document.getElementById('sizeDisplay').textContent = settings.size;
            document.getElementById('lifetimeDisplay').textContent = settings.lifetime;
        }

        function clearCanvas() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles = [];
        }

        function downloadFrame() {
            const link = document.createElement('a');
            link.href = canvas.toDataURL();
            link.download = `particles-${Date.now()}.png`;
            link.click();
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            createParticles(x, y);
        });

        window.addEventListener('resize', () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        });

        animate();
    </script>
</body>
</html>
